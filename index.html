<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Infringement Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #212126;
    --border: #2a2a30;
    --text: #e8e8ec;
    --muted: #666672;
    --accent: #7c6ff7;
    --accent2: #4fc8a0;
    --todo: #666672;
    --reported: #d4a017;
    --blocked: #3f8ef5;
    --rejected: #e05252;
    --removed: #4dab6d;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

  header { padding: 24px 32px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; gap: 32px; }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; padding-bottom: 16px; }
  .logo span { color: var(--accent); }

  nav { display: flex; gap: 0; }
  nav button { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 20px 14px; font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: color 0.15s; }
  nav button:hover { color: var(--text); }
  nav button.active { color: var(--text); border-bottom-color: var(--accent); }

  main { padding: 28px 32px; max-width: 1400px; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .metric-val { font-size: 28px; font-weight: 600; letter-spacing: -1px; }
  .metric-val.c-todo { color: var(--muted); }
  .metric-val.c-reported { color: var(--reported); }
  .metric-val.c-blocked { color: var(--blocked); }
  .metric-val.c-rejected { color: var(--rejected); }
  .metric-val.c-removed { color: var(--removed); }

  /* ADD FORM */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 20px; }
  .card-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); font-weight: 500; }
  input[type=text], select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 10px;
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  .ref-hint { font-family: var(--mono); font-size: 11px; color: var(--accent2); margin-top: 3px; display: none; }

  button.add-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 7px;
    padding: 9px 18px; font-family: var(--font); font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
  }
  button.add-btn:hover { opacity: 0.85; }
  button.sm-btn {
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-family: var(--font); font-size: 12px;
    cursor: pointer; transition: color 0.15s;
  }
  button.sm-btn:hover { color: var(--text); }

  /* SUBTABS */
  .subtabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .subtab { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .subtab:hover { color: var(--text); }
  .subtab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  .tbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .tbar-right { display: flex; gap: 8px; align-items: center; }
  .count-badge { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 1px solid #1e1e24; vertical-align: middle; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:hover td { background: var(--surface2); }
  .mono { font-family: var(--mono); font-size: 12px; }
  .del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 15px; line-height: 1; }
  .del:hover { background: #3a1818; color: var(--rejected); }

  /* BADGE */
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
  .b-todo { background: #222228; color: var(--muted); }
  .b-reported { background: #2d2410; color: var(--reported); }
  .b-blocked { background: #101c30; color: var(--blocked); }
  .b-rejected { background: #2a1212; color: var(--rejected); }
  .b-removed { background: #0e2016; color: var(--removed); }

  /* CHARTS */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .chart-card h3 { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* GAME FILTER */
  .game-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .game-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 16px; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .game-pill:hover { color: var(--text); }
  .game-pill.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }

  @media (max-width: 768px) {
    header { padding: 16px 16px 0; flex-wrap: wrap; }
    main { padding: 20px 16px; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-row2 { grid-template-columns: 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">IP<span>Track</span></div>
  <nav>
    <button class="active" onclick="switchTab('dashboard')">Dashboard</button>
    <button onclick="switchTab('log')">Log Listing</button>
    <button onclick="switchTab('data')">All Listings</button>
    <button onclick="switchTab('charts')">Charts</button>
  </nav>
</header>

<main>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="panel active">
    <div class="metrics" id="dash-metrics"></div>
    <div class="game-pills" id="game-filter"></div>
    <div class="card">
      <div class="tbar">
        <div class="card-title" style="margin:0">Recent listings</div>
        <div class="tbar-right">
          <span class="count-badge" id="dash-count"></span>
          <button class="sm-btn" onclick="exportCSV('all')">Export CSV</button>
        </div>
      </div>
      <div class="table-wrap"><table id="dash-table"><thead><tr>
        <th>Ref</th><th>Game</th><th>Marketplace</th><th>Type</th><th>Status</th><th>Notes</th><th></th>
      </tr></thead><tbody id="dash-tbody"></tbody></table></div>
    </div>
  </div>

  <!-- LOG -->
  <div id="tab-log" class="panel">
    <div class="card">
      <div class="card-title">Add new listing</div>
      <div class="form-grid">
        <div class="field">
          <label>Listing URL</label>
          <input type="text" id="inp-url" placeholder="Paste URL — ref extracted automatically" oninput="handleUrl()">
          <div class="ref-hint" id="ref-hint"></div>
        </div>
        <div class="field">
          <label>Marketplace</label>
          <select id="inp-market" onchange="handleUrl()">
            <optgroup label="Amazon">
              <option>Amazon US</option><option>Amazon UK</option><option>Amazon EU</option>
              <option>Amazon Canada</option><option>Amazon Australia</option>
            </optgroup>
            <optgroup label="Other">
              <option>eBay</option><option>Alibaba</option><option>AliExpress</option>
              <option>Walmart</option><option>Shein</option><option>Temu</option><option>Fruugo</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label>Game</label>
          <select id="inp-game">
            <option>Grab the Mic</option><option>Snort Funny</option>
            <option>Misheard Music</option><option>Sorry What?!</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="inp-status">
            <option>To do</option><option>Reported</option><option>Blocked</option>
            <option>Rejected</option><option>Removed</option>
          </select>
        </div>
      </div>
      <div class="form-row2">
        <div class="field">
          <label>Reference no.</label>
          <input type="text" id="inp-ref" placeholder="Auto-extracted or enter manually">
        </div>
        <div class="field">
          <label>Type / Notes</label>
          <input type="text" id="inp-type" placeholder="e.g. TM, copyright, brand abuse">
        </div>
        <button class="add-btn" onclick="addListing()">+ Add listing</button>
      </div>
    </div>
  </div>

  <!-- DATA -->
  <div id="tab-data" class="panel">
    <div class="subtabs" id="market-subtabs"></div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="tbar" style="padding:16px 20px 0">
        <span class="count-badge" id="data-count"></span>
        <div class="tbar-right">
          <button class="sm-btn" onclick="exportCSV(currentMarket)">Export CSV</button>
        </div>
      </div>
      <div class="table-wrap" style="padding:0 0 4px">
        <table><thead><tr>
          <th>Ref</th><th>Game</th><th>Marketplace</th><th>Type</th><th>Status</th><th>Notes</th><th></th>
        </tr></thead><tbody id="data-tbody"></tbody></table>
        <div id="data-empty" class="empty" style="display:none">No listings for this marketplace.</div>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div id="tab-charts" class="panel">
    <div class="chart-grid">
      <div class="chart-card">
        <h3>By marketplace</h3>
        <div class="chart-wrap"><canvas id="c-market"></canvas></div>
        <div class="legend" id="leg-market"></div>
      </div>
      <div class="chart-card">
        <h3>By status</h3>
        <div class="chart-wrap"><canvas id="c-status"></canvas></div>
        <div class="legend" id="leg-status"></div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <h3>Amazon regions breakdown</h3>
        <div class="chart-wrap"><canvas id="c-amazon"></canvas></div>
        <div class="legend" id="leg-amazon"></div>
      </div>
      <div class="chart-card">
        <h3>By game</h3>
        <div class="chart-wrap"><canvas id="c-game"></canvas></div>
        <div class="legend" id="leg-game"></div>
      </div>
    </div>
    <div id="charts-empty" class="empty" style="display:none">Add listings to generate charts.</div>
  </div>

</main>

const MARKETS = ['Amazon US','Amazon UK','Amazon EU','Amazon Canada','Amazon Australia','eBay','Walmart'];
const AMZ = ['Amazon US','Amazon UK','Amazon EU','Amazon Canada','Amazon Australia'];
const GAMES = ['Grab the Mic','Snort Funny','Misheard Music','Sorry What?!'];
const STATUSES = ['To do','Reported','Blocked','Rejected','Removed'];
const S_COLOR = {'To do':'#666672','Reported':'#d4a017','Blocked':'#3f8ef5','Rejected':'#e05252','Removed':'#4dab6d'};
const S_CLASS = {'To do':'b-todo','Reported':'b-reported','Blocked':'b-blocked','Rejected':'b-rejected','Removed':'b-removed'};
const M_COLORS = ['#7c6ff7','#a78bfa','#c4b5fd','#4fc8a0','#34d399','#f59e0b','#f97316'];
const G_COLORS = ['#7c6ff7','#3f8ef5','#4fc8a0','#e05252'];

// Load from localStorage, fall back to seed
let listings = (() => {
  try { const s = localStorage.getItem('iptrack'); return s ? JSON.parse(s) : [...SEED]; } catch { return [...SEED]; }
})();
let nextId = listings.reduce((m,l) => Math.max(m, l.id), 0) + 1;
let currentMarket = 'all';
let currentGame = 'all';
let charts = {};

function save() { try { localStorage.setItem('iptrack', JSON.stringify(listings)); } catch {} }

// ── URL EXTRACTION ────────────────────────────────────────────────────────────
const AMZ_DOMAINS = {'amazon.com/':'Amazon US','amazon.co.uk':'Amazon UK','amazon.de':'Amazon EU','amazon.fr':'Amazon EU','amazon.es':'Amazon EU','amazon.it':'Amazon EU','amazon.nl':'Amazon EU','amazon.ca':'Amazon Canada','amazon.com.au':'Amazon Australia'};
const EXTRACTORS = {
  'Amazon US': u => { const m=u.match(/\/([A-Z0-9]{10})(?:[/?]|$)/); return m?{ref:m[1],label:'ASIN'}:null; },
  'Amazon UK': u => { const m=u.match(/\/([A-Z0-9]{10})(?:[/?]|$)/); return m?{ref:m[1],label:'ASIN'}:null; },
  'Amazon EU': u => { const m=u.match(/\/([A-Z0-9]{10})(?:[/?]|$)/); return m?{ref:m[1],label:'ASIN'}:null; },
  'Amazon Canada': u => { const m=u.match(/\/([A-Z0-9]{10})(?:[/?]|$)/); return m?{ref:m[1],label:'ASIN'}:null; },
  'Amazon Australia': u => { const m=u.match(/\/([A-Z0-9]{10})(?:[/?]|$)/); return m?{ref:m[1],label:'ASIN'}:null; },
  'eBay': u => { const m=u.match(/\/itm\/(?:[^/]+\/)?(\d{10,13})/); return m?{ref:m[1],label:'Item ID'}:null; },
  'Walmart': u => { const m=u.match(/\/ip\/(?:[^/]+\/)?(\d+)/); return m?{ref:m[1],label:'Item ID'}:null; },
};
function autoMarket(url) {
  for (const [d,n] of Object.entries(AMZ_DOMAINS)) if (url.includes(d)) return n;
  if (url.includes('ebay.')) return 'eBay';
  if (url.includes('walmart.')) return 'Walmart';
  return null;
}
function handleUrl() {
  const url = document.getElementById('inp-url').value.trim();
  const hint = document.getElementById('ref-hint');
  if (!url) { hint.style.display='none'; return; }
  const det = autoMarket(url);
  if (det) document.getElementById('inp-market').value = det;
  const mkt = document.getElementById('inp-market').value;
  const ex = EXTRACTORS[mkt];
  if (!ex) return;
  const r = ex(url);
  if (r) {
    document.getElementById('inp-ref').value = r.ref;
    hint.textContent = r.label + ': ' + r.ref;
    hint.style.display = 'block';
  } else { hint.style.display='none'; }
}

// ── BADGE ─────────────────────────────────────────────────────────────────────
function badge(s) { return `<span class="badge ${S_CLASS[s]||'b-todo'}">${s}</span>`; }
function refCell(l) {
  const r = l.url ? `<a href="${l.url}" target="_blank" style="color:var(--accent2);text-decoration:none">${l.ref}</a>` : l.ref;
  return `<span class="mono">${r}</span>`;
}

// ── METRICS ───────────────────────────────────────────────────────────────────
function metrics(data) {
  const total = data.length;
  return `
    <div class="metric"><div class="metric-label">Total</div><div class="metric-val" style="color:var(--text)">${total}</div></div>
    ${STATUSES.map(s=>`<div class="metric"><div class="metric-label">${s}</div><div class="metric-val c-${s.toLowerCase().replace(' ','-').replace('to-do','todo')}">${data.filter(l=>l.status===s).length}</div></div>`).join('')}
  `;
}

// ── TABLE ROW ─────────────────────────────────────────────────────────────────
function row(l) {
  return `<tr>
    <td>${refCell(l)}</td>
    <td style="color:var(--muted);font-size:12px">${l.game}</td>
    <td style="color:var(--muted);font-size:12px">${l.market}</td>
    <td style="max-width:180px">${l.type}</td>
    <td>${badge(l.status)}</td>
    <td style="color:var(--muted);font-size:12px;max-width:160px">${l.notes}</td>
    <td><button class="del" onclick="del(${l.id})" title="Delete">×</button></td>
  </tr>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const filtered = currentGame==='all' ? listings : listings.filter(l=>l.game===currentGame);
  document.getElementById('dash-metrics').innerHTML = metrics(filtered);
  document.getElementById('dash-count').textContent = filtered.length + ' listings';
  document.getElementById('dash-tbody').innerHTML = filtered.length
    ? [...filtered].reverse().map(row).join('')
    : '<tr><td colspan="7" class="empty">No listings yet.</td></tr>';

  // game filter pills
  const gf = document.getElementById('game-filter');
  gf.innerHTML = `<button class="game-pill ${currentGame==='all'?'active':''}" onclick="setGame('all')">All games</button>` +
    GAMES.map(g=>`<button class="game-pill ${currentGame===g?'active':''}" onclick="setGame('${g.replace("'","\\'")}')">${g}</button>`).join('');
}
function setGame(g) { currentGame=g; renderDashboard(); }

// ── DATA TAB ──────────────────────────────────────────────────────────────────
function buildSubtabs() {
  const st = document.getElementById('market-subtabs');
  st.innerHTML = `<button class="subtab ${currentMarket==='all'?'active':''}" onclick="setMarket('all')">All (${listings.length})</button>` +
    MARKETS.map(m=>`<button class="subtab ${currentMarket===m?'active':''}" onclick="setMarket('${m}')">${m} (${listings.filter(l=>l.market===m).length})</button>`).join('');
}
function setMarket(m) { currentMarket=m; buildSubtabs(); renderData(); }
function renderData() {
  const filtered = currentMarket==='all' ? listings : listings.filter(l=>l.market===currentMarket);
  document.getElementById('data-count').textContent = filtered.length + ' listings';
  const tbody = document.getElementById('data-tbody');
  const empty = document.getElementById('data-empty');
  if (!filtered.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = [...filtered].reverse().map(row).join('');
}

// ── ADD / DELETE ──────────────────────────────────────────────────────────────
function addListing() {
  const ref = document.getElementById('inp-ref').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  if (!ref) { document.getElementById('inp-ref').focus(); return; }
  listings.push({
    id: nextId++,
    ref, url,
    market: document.getElementById('inp-market').value,
    game: document.getElementById('inp-game').value,
    status: document.getElementById('inp-status').value,
    type: document.getElementById('inp-type').value,
    notes: ''
  });
  save();
  document.getElementById('inp-ref').value='';
  document.getElementById('inp-url').value='';
  document.getElementById('inp-type').value='';
  document.getElementById('ref-hint').style.display='none';
  renderAll();
  switchTab('dashboard');
}
function del(id) {
  if (!confirm('Delete this listing?')) return;
  listings = listings.filter(l=>l.id!==id);
  save(); renderAll();
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function makeLeg(id, labels, colors) {
  document.getElementById(id).innerHTML = labels.map((l,i)=>
    `<div class="leg-item"><div class="leg-dot" style="background:${colors[i]}"></div>${l}</div>`).join('');
}
function mkChart(id, type, labels, data, colors, opts={}) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id);
  charts[id] = new Chart(ctx, { type,
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: type==='bar'?4:0, borderWidth: type==='doughnut'?1:0, borderSkipped:false, ...opts }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales: type==='bar' ? { x:{grid:{display:false},ticks:{color:'#666672',font:{size:11}}}, y:{grid:{color:'#1e1e24'},ticks:{color:'#666672',font:{size:11},stepSize:1}} } : {}
    }
  });
}
function renderCharts() {
  if (!listings.length) { document.getElementById('charts-empty').style.display='block'; return; }
  document.getElementById('charts-empty').style.display='none';

  const mCounts = MARKETS.map(m=>listings.filter(l=>l.market===m).length);
  mkChart('c-market','bar',MARKETS,mCounts,M_COLORS);
  makeLeg('leg-market',MARKETS,M_COLORS);

  const sCounts = STATUSES.map(s=>listings.filter(l=>l.status===s).length);
  mkChart('c-status','doughnut',STATUSES,sCounts,STATUSES.map(s=>S_COLOR[s]),{borderWidth:2});
  makeLeg('leg-status',STATUSES,STATUSES.map(s=>S_COLOR[s]));

  const amzCounts = AMZ.map(m=>listings.filter(l=>l.market===m).length);
  mkChart('c-amazon','bar',AMZ,amzCounts,['#7c6ff7','#a78bfa','#c4b5fd','#4fc8a0','#34d399']);
  makeLeg('leg-amazon',AMZ,['#7c6ff7','#a78bfa','#c4b5fd','#4fc8a0','#34d399']);

  const gCounts = GAMES.map(g=>listings.filter(l=>l.game===g).length);
  mkChart('c-game','doughnut',GAMES,gCounts,G_COLORS,{borderWidth:2});
  makeLeg('leg-game',GAMES,G_COLORS);
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(mkt) {
  const data = mkt==='all' ? listings : listings.filter(l=>l.market===mkt);
  const rows = [['Reference','Game','Marketplace','Type','Status','Notes','URL']];
  data.forEach(l=>rows.push([l.ref,l.game,l.market,l.type,l.status,l.notes,l.url]));
  const csv = rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `ip-tracker-${mkt==='all'?'all':mkt.replace(/ /g,'-').toLowerCase()}.csv`;
  a.click();
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',['dashboard','log','data','charts'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='data'){buildSubtabs();renderData();}
  if(t==='charts') renderCharts();
  if(t==='dashboard') renderDashboard();
}

function renderAll() { renderDashboard(); buildSubtabs(); renderData(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
